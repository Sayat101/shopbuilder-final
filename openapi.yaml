  # PAYMENTS
  /payments/checkout:
    post:
      tags: [Payments]
      summary: Process payment via mock provider
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amount, method, idempotencyKey]
              properties:
                orderId:
                  type: string
                  example: clx123abc
                amount:
                  type: integer
                  description: Amount in tiyn
                  example: 150000
                method:
                  type: string
                  enum: [MOCK_CARD, MOCK_FAIL]
                  example: MOCK_CARD
                idempotencyKey:
                  type: string
                  example: idem_abc123
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                    example: pay_abc123
                  status:
                    type: string
                    enum: [SUCCESS, FAILED]
                  amount:
                    type: integer
                    example: 150000
                  method:
                    type: string
                    example: MOCK_CARD
                  transactedAt:
                    type: string
                    format: date-time
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
