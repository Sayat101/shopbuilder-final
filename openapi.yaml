openapi: 3.0.3
info:
  title: ShopBuilder API
  version: 1.0.0
  description: Final defense API contract for the ShopBuilder multi-tenant ecommerce demo.
servers:
  - url: http://localhost:3000
    description: Local backend
  - url: https://shopbuilder.onrender.com
    description: Deployed backend
tags:
  - name: Auth
  - name: Tenants
  - name: Products
  - name: Storefront
  - name: Cart
  - name: Orders
  - name: Payments
  - name: Discounts
  - name: Analytics
  - name: Webhooks
  - name: Health
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              example:
                status: ok
                timestamp: '2026-05-21T17:00:00.000Z'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a merchant or customer and queue verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              merchant:
                value:
                  email: merchant@shopbuilder.kz
                  password: Password123!
                  role: MERCHANT
                  subdomain: aigerim-bags
              customer:
                value:
                  email: customer@shopbuilder.kz
                  password: Password123!
                  role: CUSTOMER
      responses:
        '201':
          description: User registered; verification email queued
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email using token from email link
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Email verified
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login verified user and issue access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: merchant@shopbuilder.kz
              password: Password123!
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new tokens
      requestBody:
        required: true
        content:
          application/json:
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New tokens issued
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Return authenticated user claims
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Queue password reset email
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: merchant@shopbuilder.kz
      responses:
        '200':
          description: Reset email queued if the account exists

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using emailed token
      requestBody:
        required: true
        content:
          application/json:
            example:
              token: 4d2e8a46-3aa0-4b2f-a1d0-f9a51bb10d94
              newPassword: NewPassword123!
      responses:
        '200':
          description: Password changed
        '422':
          $ref: '#/components/responses/ValidationError'

  /tenants:
    get:
      tags: [Tenants]
      summary: List tenants; merchants only see their own tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Cursor-paginated tenants
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Tenants]
      summary: Create tenant manually (SUPER_ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              subdomain: nukus-top
              plan: PRO
      responses:
        '201':
          description: Tenant created
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get tenant details
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Tenant
        '404':
          $ref: '#/components/responses/NotFound'

  /products:
    get:
      tags: [Products]
      summary: List authenticated tenant products
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Cursor-paginated products
    post:
      tags: [Products]
      summary: Create product and generate Size x Color x Material variant matrix
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              title: Sweater
              description: Warm winter sweater
              price: 15000
              options:
                colors: [Red, Blue]
                sizes: [S, M, L]
                materials: [Cotton]
      responses:
        '201':
          description: Product with generated variants
        '403':
          $ref: '#/components/responses/Forbidden'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Product
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Products]
      summary: Update product title or description
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Premium Sweater
              description: Updated description
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Products]
      summary: Archive product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Product archived

  /products/{id}/status:
    patch:
      tags: [Products]
      summary: Change product status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              status: ACTIVE
      responses:
        '200':
          description: Status updated

  /products/{id}/variants:
    get:
      tags: [Products]
      summary: List product variants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Variants

  /products/{id}/variants/{variantId}:
    patch:
      tags: [Products]
      summary: Update variant price
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - in: path
          name: variantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              price: 17000
      responses:
        '200':
          description: Variant updated

  /products/inventory/adjust:
    post:
      tags: [Products]
      summary: Adjust inventory level for a variant and warehouse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              variantId: cm123variant
              locationId: cm123warehouse
              quantity: 10
      responses:
        '200':
          description: Inventory adjusted

  /products/locations/all:
    get:
      tags: [Products]
      summary: List tenant warehouse locations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Warehouse locations

  /storefront/{subdomain}:
    get:
      tags: [Storefront]
      summary: Get public storefront metadata
      parameters:
        - $ref: '#/components/parameters/Subdomain'
      responses:
        '200':
          description: Storefront metadata

  /storefront/{subdomain}/products:
    get:
      tags: [Storefront]
      summary: List active public products
      parameters:
        - $ref: '#/components/parameters/Subdomain'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Cursor-paginated active products

  /storefront/{subdomain}/products/{productId}:
    get:
      tags: [Storefront]
      summary: Get public product
      parameters:
        - $ref: '#/components/parameters/Subdomain'
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product

  /cart:
    get:
      tags: [Cart]
      summary: Get or create current customer cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart
    delete:
      tags: [Cart]
      summary: Clear current customer cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared

  /cart/items:
    post:
      tags: [Cart]
      summary: Add variant to current cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              variantId: cm123variant
              quantity: 2
      responses:
        '201':
          description: Cart updated

  /cart/items/{variantId}:
    patch:
      tags: [Cart]
      summary: Update cart item quantity; 0 removes item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: variantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              quantity: 3
      responses:
        '200':
          description: Cart updated
    delete:
      tags: [Cart]
      summary: Remove cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: variantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cart updated

  /cart/abandoned:
    get:
      tags: [Cart]
      summary: List abandoned carts for merchant tenant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Abandoned carts

  /cart/abandoned/{cartId}/recover:
    post:
      tags: [Cart]
      summary: Queue abandoned cart recovery email
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recovery email queued

  /orders:
    get:
      tags: [Orders]
      summary: List current customer's orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Customer orders
    post:
      tags: [Orders]
      summary: Place an order from current cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '201':
          description: Order placed and emails queued

  /orders/all:
    get:
      tags: [Orders]
      summary: List tenant orders for merchant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, PAID, FULFILLED, REFUNDED, CANCELLED]
      responses:
        '200':
          description: Tenant orders

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order; customers can only access their own
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Order

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Move order through valid state transition
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              status: FULFILLED
      responses:
        '200':
          description: Status updated

  /orders/{id}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel own pending order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            example:
              reason: Changed my mind
      responses:
        '200':
          description: Order cancelled

  /orders/{id}/refund:
    post:
      tags: [Orders]
      summary: Refund own paid or fulfilled order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Refund processed

  /orders/{id}/timeline:
    get:
      tags: [Orders]
      summary: Get order audit timeline
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Timeline

  /payments/checkout:
    post:
      tags: [Payments]
      summary: Process mock card payment with idempotency
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              orderId: cm123order
              amount: 30000
              method: MOCK_CARD
              idempotencyKey: idem-cm123order
      responses:
        '200':
          description: Payment result

  /discounts:
    get:
      tags: [Discounts]
      summary: List merchant discount codes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Discount codes
    post:
      tags: [Discounts]
      summary: Create discount code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              code: SAVE20
              type: PERCENTAGE
              value: 20
              isStackable: false
              maxUsage: 100
      responses:
        '201':
          description: Discount created

  /discounts/{id}:
    delete:
      tags: [Discounts]
      summary: Delete discount code
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Discount deleted

  /discounts/apply:
    post:
      tags: [Discounts]
      summary: Preview discount, VAT, and total
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              code: SAVE20
              orderAmount: 30000
      responses:
        '200':
          description: Discount calculation

  /analytics/overview:
    get:
      tags: [Analytics]
      summary: Cached tenant overview analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Overview analytics

  /analytics/inventory:
    get:
      tags: [Analytics]
      summary: Cached tenant inventory analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory analytics

  /analytics/revenue:
    get:
      tags: [Analytics]
      summary: Cached 30-day revenue by day
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Revenue by day

  /webhooks/endpoints:
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Webhook endpoints
    post:
      tags: [Webhooks]
      summary: Register webhook endpoint and generate HMAC secret
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              url: https://webhook.site/your-id
              events: [order.created, order.paid, order.fulfilled]
      responses:
        '201':
          description: Endpoint registered

  /webhooks/endpoints/{id}:
    delete:
      tags: [Webhooks]
      summary: Delete webhook endpoint
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Endpoint deleted

  /webhooks/endpoints/{id}/test:
    post:
      tags: [Webhooks]
      summary: Queue test webhook delivery
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Test delivery queued

  /webhooks/deliveries:
    get:
      tags: [Webhooks]
      summary: List recent webhook delivery attempts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Webhook deliveries

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
    Subdomain:
      in: path
      name: subdomain
      required: true
      schema:
        type: string
      example: aigerim-bags
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 20
        maximum: 100
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [MERCHANT, CUSTOMER, STAFF, DEVELOPER]
        subdomain:
          type: string
          description: Required for MERCHANT registration
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            role: { type: string }
            tenantId: { type: string }
        accessToken:
          type: string
        refreshToken:
          type: string
    CreateProductRequest:
      type: object
      required: [title, price]
      properties:
        title: { type: string }
        description: { type: string }
        price:
          type: integer
          description: Price in tiyn
        options:
          type: object
          properties:
            colors:
              type: array
              items: { type: string }
            sizes:
              type: array
              items: { type: string }
            materials:
              type: array
              items: { type: string }
        locationId: { type: string }
    PlaceOrderRequest:
      type: object
      required: [tenantId, shippingAddress]
      properties:
        tenantId: { type: string }
        shippingAddress:
          type: object
          required: [name, street, city, country, zip]
          properties:
            name: { type: string }
            street: { type: string }
            city: { type: string }
            country:
              type: string
              example: KZ
            zip: { type: string }
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
  responses:
    Unauthorized:
      description: Missing, invalid, expired, or revoked token
      content:
        application/json:
          example:
            error: Unauthorized
            message: Invalid token
    Forbidden:
      description: Authenticated user has insufficient role
      content:
        application/json:
          example:
            error: 'Role CUSTOMER is not authorized. Required: MERCHANT'
    NotFound:
      description: Entity not found
      content:
        application/json:
          example:
            error: Product not found
    Conflict:
      description: Resource conflict
      content:
        application/json:
          example:
            error: Email already registered
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          example:
            error: Validation error
            details:
              - field: email
                message: Invalid email
